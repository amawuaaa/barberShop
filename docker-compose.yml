services:
  postgres:
    image: postgres:16-alpine
    container_name: barbershop-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: barbershop
      POSTGRES_PASSWORD: barbershop
      POSTGRES_DB: barbershop
    volumes:
      - barbershop_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U barbershop -d barbershop"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  barbershop_pg_data:
